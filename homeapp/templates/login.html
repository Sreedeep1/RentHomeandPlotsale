{% extends "index_nav.html" %}
{% block content %}
<style>
    .header {
        background-color: black !important;
    }
    
    .login-container {
        max-width: 400px;
        margin: 100px auto;
        padding: 40px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(0, 0, 0, 0.05);
    }
    
    .login-title {
        text-align: center;
        color: #333;
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 30px;
        letter-spacing: -0.5px;
    }
    
    .form-group {
        margin-bottom: 24px;
    }
    
    .form-label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 500;
        font-size: 14px;
    }
    
    .form-input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e1e5e9;
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #f8f9fa;
    }
    
    .form-input:focus {
        outline: none;
        border-color: #4f46e5;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .form-input::placeholder {
        color: #999;
    }
    
    .error-message {
        background: #fee;
        color: #d32f2f;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 24px;
        text-align: center;
        border-left: 4px solid #d32f2f;
        font-size: 14px;
    }
    
    .login-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #4f46e5 0%, #7c73e6 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
    }
    
    .login-btn:hover {
        background: linear-gradient(135deg, #4338ca 0%, #6d63d9 100%);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(79, 70, 229, 0.3);
    }
    
    .login-btn:active {
        transform: translateY(0);
    }
    
    .divider {
        display: flex;
        align-items: center;
        margin: 30px 0;
        color: #999;
    }
    
    .divider::before,
    .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e1e5e9;
    }
    
    .divider span {
        padding: 0 15px;
        font-size: 14px;
    }
    
    .signup-link {
        text-align: center;
        margin-top: 25px;
        color: #666;
        font-size: 14px;
    }
    
    .signup-link a {
        color: #4f46e5;
        text-decoration: none;
        font-weight: 500;
    }
    
    .signup-link a:hover {
        text-decoration: underline;
    }
    
    .password-toggle {
        position: relative;
    }
    
    .toggle-icon {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #999;
    }
    
    @media (max-width: 480px) {
        .login-container {
            margin: 60px 20px;
            padding: 30px 25px;
        }
    }
</style>

<div class="login-container">
    <h2 class="login-title">Welcome Back</h2>

    {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input 
                type="email" 
                name="email" 
                required 
                class="form-input" 
                placeholder="Enter your email"
            >
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input 
                type="password" 
                name="password" 
                required 
                class="form-input" 
                placeholder="Enter your password"
            >
        </div>

        <button type="submit" class="login-btn">
            Sign In
        </button>

        <div class="divider">
            <span>New here?</span>
        </div>

        <div class="signup-link">
            Don't have an account? <a href="/signup">Create one now</a>
        </div>
    </form>
</div>

{% endblock %}
